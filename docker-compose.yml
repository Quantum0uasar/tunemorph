version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount backend code for live reload during dev
      - ./backend:/app/backend
    environment:
      - TUNEMORPH_ENV=development
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  # Optional: serve the frontend via nginx
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
